<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miraya's 1st Birthday — RSVP</title>
<meta property="og:title" content="Miraya's 1st Birthday — RSVP 🎀">
<meta property="og:description" content="5th Sept (Sat.) · 13:00 · Tokyo Mithaiwala, Nishikasai — tap to tell us if you can join!">
<meta name="description" content="RSVP for Miraya's 1st Birthday — 5th Sept (Sat.), 13:00, Tokyo Mithaiwala, Nishikasai.">
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#E7C3C9;--pink-soft:#F3DDE1;--rose:#C67C8A;--mauve:#B05A6A;--white:#FFFDFB;--charcoal:#4A4648;--gold:#DBB26A;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--pink);min-height:100vh;color:var(--charcoal);display:flex;justify-content:center;padding:26px 14px 60px;position:relative;overflow-x:hidden;}
body::before,body::after{content:"";position:fixed;width:190px;height:190px;background:var(--rose);z-index:0;opacity:.85;}
body::before{top:0;left:0;border-bottom-right-radius:75% 95%}
body::after{bottom:0;right:0;border-top-left-radius:75% 95%}
.sparkle{position:fixed;color:#fff;opacity:.7;animation:tw 2.8s ease-in-out infinite;z-index:0;pointer-events:none}
@keyframes tw{0%,100%{opacity:.15;transform:scale(.6) rotate(0)}50%{opacity:.8;transform:scale(1) rotate(20deg)}}
.card{position:relative;z-index:1;width:100%;max-width:480px;background:var(--white);border-radius:26px;padding:34px 26px 30px;box-shadow:0 18px 50px rgba(176,90,106,.28);}
.eyebrow{text-align:center;font-weight:800;font-size:12px;letter-spacing:.32em;color:var(--rose);text-transform:uppercase;}
h1{font-family:'Fredoka',sans-serif;font-weight:700;text-align:center;font-size:34px;color:var(--mauve);margin:8px 0 4px;text-shadow:2px 2px 0 rgba(74,70,72,.12);}
.when{text-align:center;font-weight:800;font-size:13.5px;line-height:1.55;letter-spacing:.06em;margin-bottom:6px;}
.when b{color:var(--mauve)}
.doodle{display:block;margin:6px auto 14px}
hr{border:none;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:14px 0 20px}
label.q{display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;color:var(--charcoal);margin:18px 0 8px}
input[type=text],textarea,select{width:100%;border:2px solid var(--pink);border-radius:14px;padding:12px 14px;font:inherit;font-weight:700;color:var(--charcoal);background:#fff;outline:none;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--rose)}
textarea{resize:vertical;min-height:70px}
.choice{display:flex;gap:12px}
.choice button{flex:1;padding:14px 8px;border-radius:16px;border:2px solid var(--pink);background:#fff;font:inherit;font-weight:800;font-size:16px;color:var(--charcoal);cursor:pointer;transition:all .15s;}
.choice button.sel{background:var(--rose);border-color:var(--rose);color:#fff;transform:scale(1.03)}
.choice button:hover{border-color:var(--rose)}
.stepper{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.stepper button{width:46px;height:46px;border-radius:50%;border:2px solid var(--pink);background:#fff;font-size:24px;font-weight:800;color:var(--mauve);cursor:pointer;line-height:1;}
.stepper button:hover{border-color:var(--rose)}
.stepper .num{font-family:'Fredoka',sans-serif;font-size:26px;font-weight:700;min-width:34px;text-align:center;color:var(--mauve)}
.hint{font-size:12.5px;font-weight:700;color:#9b8a8e;margin-top:4px;display:inline-block}
.kids-ages{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;margin-bottom:14px;}
.kid{display:flex;align-items:center;gap:8px;background:var(--pink-soft);border-radius:12px;padding:8px 12px;font-weight:800;font-size:13px;}
.kid select{width:auto;padding:6px 8px;border-radius:8px;font-size:13px}
#extra{max-height:0;overflow:hidden;transition:max-height .5s ease;opacity:0}
#extra.open{max-height:900px;opacity:1;transition:max-height .6s ease,opacity .4s ease .15s}
.submit{width:100%;margin-top:26px;padding:16px;border:none;border-radius:18px;cursor:pointer;font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;color:#fff;background:linear-gradient(135deg,var(--rose),var(--mauve));box-shadow:0 8px 22px rgba(176,90,106,.4);transition:transform .12s;}
.submit:hover{transform:translateY(-2px)}
.err{color:#c0392b;font-weight:800;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
#done{display:none;text-align:center;padding:20px 4px}
#done h2{font-family:'Fredoka',sans-serif;color:var(--mauve);font-size:28px;margin-bottom:10px}
#done p{font-weight:700;line-height:1.6}
#summaryBox{margin-top:16px;background:var(--pink-soft);border-radius:14px;padding:14px;font-size:13.5px;font-weight:700;text-align:left;white-space:pre-wrap;display:none;}
.mini{margin-top:14px;background:#fff;border:2px solid var(--pink);color:var(--mauve);border-radius:12px;padding:10px 16px;font:inherit;font-weight:800;cursor:pointer;font-size:14px;}
.mini:hover{border-color:var(--rose)}
</style>
</head>
<body>
<div class="card">
  <div id="form">
    <div class="eyebrow">You're invited to</div>
    <h1>Miraya's 1st Birthday</h1>
    <svg class="doodle" width="120" height="34" viewBox="0 0 120 34">
      <g fill="none" stroke="#C67C8A" stroke-width="2" stroke-linecap="round">
        <ellipse cx="16" cy="16" rx="9" ry="11"/><path d="M16 27 l-3 5 M13 32 h6 l-3 -5"/>
        <path d="M45 24 h30 v-8 q0 -4 -15 -4 t-15 4 Z M52 12 v-7 M60 12 v-9 M68 12 v-7"/>
        <ellipse cx="104" cy="16" rx="9" ry="11"/><path d="M104 27 l3 5 M101 32 h6 l-3 -5"/>
      </g>
    </svg>
    <div class="when"><b>5th Sept (Sat.) · 13:00 onwards</b><br>Tokyo Mithaiwala — Edogawa-ku,<br>Nishikasai 6-8-5, 3rd Floor</div>
    <hr>
    <label class="q">Your name</label>
    <input type="text" id="name" placeholder="e.g. The Tanaka Family" maxlength="60">
    <label class="q">Will you join the celebration?</label>
    <div class="choice">
      <button type="button" id="btnYes">🎉 Joyfully yes!</button>
      <button type="button" id="btnNo">😢 Sadly, no</button>
    </div>
    <div id="extra">
      <label class="q">How many of you will come in total?</label>
      <div class="stepper">
        <button type="button" onclick="step('total',-1)">−</button>
        <span class="num" id="totalN">1</span>
        <button type="button" onclick="step('total',1)">+</button>
        <span class="hint">including you</span>
      </div>
      <label class="q">…and how many are kids?</label>
      <div class="stepper">
        <button type="button" onclick="step('kids',-1)">−</button>
        <span class="num" id="kidsN">0</span>
        <button type="button" onclick="step('kids',1)">+</button>
      </div>
      <div class="kids-ages" id="ages"></div>
      <label class="q">A message for Miraya's family <span style="font-weight:500;font-size:13px">(optional)</span></label>
      <textarea id="msg" placeholder="Can't wait to celebrate! 🎂" maxlength="300"></textarea>
    </div>
    <button class="submit" id="submitBtn" onclick="submitRSVP()">Send my RSVP ♥</button>
    <div class="err" id="err"></div>
  </div>

  <div id="done">
    <h2 id="doneTitle">Thank you! 🎉</h2>
    <p id="doneText"></p>
    <div id="summaryBox"></div>
    <button class="mini" onclick="resetForm()">Send another response</button>
  </div>
</div>
<script>
(function(){for(let i=0;i<14;i++){const s=document.createElement('div');s.className='sparkle';s.textContent='✦';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.fontSize=(10+Math.random()*16)+'px';s.style.animationDelay=(Math.random()*3)+'s';document.body.appendChild(s);}})();
let attending=null,total=1,kids=0;
const $=id=>document.getElementById(id);

// PASTE YOUR GOOGLE SHEET WEB APP URL BETWEEN THE QUOTES BELOW:
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzLOqQ7friW2jL9SqYCeFO1dMmq4UBamBGhn0R6spO4RABsgnemNsbOcNYSPBMdCRt4mA/exec";

$('btnYes').onclick=()=>setAttend(true);$('btnNo').onclick=()=>setAttend(false);
function setAttend(v){attending=v;$('btnYes').classList.toggle('sel',v);$('btnNo').classList.toggle('sel',!v);$('extra').classList.toggle('open',v);}
function step(which,d){if(which==='total'){total=Math.min(12,Math.max(1,total+d));if(kids>total)kids=Math.min(kids,total);}else{kids=Math.min(8,Math.max(0,kids+d));if(kids>total)total=kids;}$('totalN').textContent=total;$('kidsN').textContent=kids;renderAges();}
function renderAges(){const box=$('ages');const prev=[...box.querySelectorAll('select')].map(s=>s.value);box.innerHTML='';for(let i=0;i<kids;i++){const div=document.createElement('div');div.className='kid';const sel=document.createElement('select');sel.innerHTML='<option value="">age?</option><option value="0">under 1</option>'+Array.from({length:17},(_,a)=>`<option value="${a+1}">${a+1}</option>`).join('');if(prev[i])sel.value=prev[i];div.append(`Kid ${i+1}: `,sel);box.appendChild(div);}}
function buildEntry(){const name=$('name').value.trim();if(!name)return{error:'Please tell us your name 🙂'};if(attending===null)return{error:'Please choose yes or no 🙂'};const entry={name,attending,ts:Date.now()};if(attending){entry.total=total;entry.kids=kids;entry.ages=[...$('ages').querySelectorAll('select')].map(s=>s.value);if(entry.ages.some(a=>a===''))return{error:'Please pick an age for each kid 🙂'};entry.ages=entry.ages.map(a=>a==='0'?'under 1':a);}entry.msg=$('msg').value.trim();return{entry};}
function summaryText(e){let s=`RSVP — Miraya's 1st Birthday\nName: ${e.name}\nAttending: ${e.attending?'YES 🎉':'No 😢'}`;if(e.attending){s+=`\nGuests: ${e.total} (kids: ${e.kids}${e.kids?` — ages ${e.ages.join(', ')}`:''})`;}if(e.msg)s+=`\nMessage: ${e.msg}`;return s;}

function submitRSVP(){
  $('err').textContent='';const {entry,error}=buildEntry();if(error){$('err').textContent=error;return;}
  const btn = $('submitBtn'); btn.disabled = true; btn.textContent = 'Sending...';

  fetch(GOOGLE_SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(entry)
  }).then(() => {
    btn.disabled = false; btn.textContent = 'Send my RSVP ♥';
    $('form').style.display='none';$('done').style.display='block';
    $('doneTitle').textContent=entry.attending?'Yay, see you there! 🎉':"We'll miss you 💗";
    $('doneText').textContent=`Your response has been registered successfully.`;
    $('summaryBox').style.display='block';$('summaryBox').textContent=summaryText(entry);
    confettiPop();
  }).catch(() => {
    btn.disabled = false; btn.textContent = 'Send my RSVP ♥';
    $('err').textContent = 'Error connecting to database. Please try again.';
  });
}

function resetForm(){$('done').style.display='none';$('form').style.display='block';$('summaryBox').style.display='none';$('name').value='';$('msg').value='';attending=null;$('btnYes').classList.remove('sel');$('btnNo').classList.remove('sel');$('extra').classList.remove('open');total=1;kids=0;$('totalN').textContent=1;$('kidsN').textContent=0;renderAges();}
function confettiPop(){const colors=['#C67C8A','#E7C3C9','#DBB26A','#fff','#B05A6A'];for(let i=0;i<36;i++){const p=document.createElement('div');p.style.cssText=`position:fixed;left:50%;top:38%;width:9px;height:12px;z-index:9;pointer-events:none;background:${colors[i%colors.length]};border-radius:${i%3?2:8}px;`;document.body.appendChild(p);const a=Math.random()*Math.PI*2,v=120+Math.random()*220;const dx=Math.cos(a)*v,dy=Math.sin(a)*v-160;p.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${dx}px,${dy+320}px) rotate(${Math.random()*720-360}deg)`,opacity:0}],{duration:1400+Math.random()*700,easing:'cubic-bezier(.2,.7,.4,1)'}).onfinish=()=>p.remove();}}
renderAges();
</script>
</body>
</html>
